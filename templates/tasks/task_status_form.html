{% extends "base.html" %}

{% block content %}

<h1>Update task status</h1>

<p>
    Task: {{ object.title }}
</p>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Update
    </button>

</form>

<a href="{% url 'task-list' %}">
    Cancel
</a>

{% endblock %}
