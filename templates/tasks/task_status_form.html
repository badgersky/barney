{% extends "base.html" %}
{% block title %}Zmiana statusu — Barney{% endblock %}

{% block content %}
<div class="page-head"><h1>Zmień status zadania</h1></div>

<div class="card card--accent">
  <p style="color:var(--muted)">Zadanie: <strong>{{ object.title }}</strong></p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="form-actions">
      <button type="submit" class="btn btn--primary">Zapisz</button>
      <a href="{% url 'task-detail' object.pk %}" class="btn btn--ghost">Anuluj</a>
    </div>
  </form>
</div>
{% endblock %}
