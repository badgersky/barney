{% extends "base.html" %}

{% block content %}

<h1>Delete task</h1>

<p>
    Are you sure you want to delete
    "{{ object.title }}"?
</p>

<form method="post">

    {% csrf_token %}

    <button type="submit">
        Delete
    </button>

</form>

<a href="{% url 'task-list' %}">
    Cancel
</a>

{% endblock %}
