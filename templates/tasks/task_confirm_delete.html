{% extends "base.html" %}
{% block title %}Usuń zadanie — Barney{% endblock %}

{% block content %}
<div class="page-head"><h1>Usuń zadanie</h1></div>
<div class="card card--accent">
  <p>Czy na pewno chcesz usunąć zadanie „<strong>{{ object.title }}</strong>"? Tej operacji nie można cofnąć.</p>
  <form method="post">
    {% csrf_token %}
    <div class="form-actions">
      <button type="submit" class="btn btn--danger">Tak, usuń</button>
      <a href="{% url 'task-detail' object.pk %}" class="btn btn--ghost">Anuluj</a>
    </div>
  </form>
</div>
{% endblock %}
