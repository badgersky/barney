{% extends "base.html" %}

{% block content %}

<h1>{{ building.name }}</h1>

<p>{{ building.description }}</p>

<p>Created by: {{ building.created_by }}</p>
<p>Created at: {{ building.created_at }}</p>

<a href="{% url 'building-update' building.pk %}">
    Edit
</a>

<a href="{% url 'building-delete' building.pk %}">
    Delete
</a>

<a href="{% url 'building-list' %}">
    Back
</a>

{% endblock %}
