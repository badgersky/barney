{% extends "base.html" %}
{% block title %}Usuń lokalizację — Barney{% endblock %}

{% block content %}
<div class="page-head"><h1>Usuń lokalizację</h1></div>
<div class="card card--accent">
  <p>Czy na pewno chcesz usunąć „<strong>{{ object.name }}</strong>"?</p>
  <p style="color:var(--muted);font-size:.9rem">Zwierzęta i zadania nie zostaną usunięte — stracą jedynie powiązanie z tą lokalizacją.</p>
  <form method="post">
    {% csrf_token %}
    <div class="form-actions">
      <button type="submit" class="btn btn--danger">Tak, usuń</button>
      <a href="{% url 'building-detail' object.pk %}" class="btn btn--ghost">Anuluj</a>
    </div>
  </form>
</div>
{% endblock %}
