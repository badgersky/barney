{% extends "base.html" %}

{% block content %}

<h1>Delete animal</h1>

<p>
    Are you sure you want to delete
    "{{ object.name }}"?
</p>

<form method="post">
    {% csrf_token %}

    <button type="submit">
        Delete
    </button>
</form>

<a href="{% url 'animal-detail' object.pk %}">
    Cancel
</a>

{% endblock %}
