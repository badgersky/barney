services:
  db:
    image: postgres:16

    environment:
      POSTGRES_DB: barney
      POSTGRES_USER: barney
      POSTGRES_PASSWORD: barney

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data: